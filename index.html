<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <base target="_self">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1198714971337229" crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020914">
    <title>Zikirmatik Pro | V55 Lux</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020914;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #f8fafc;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.3);
            --orange: #f97316;
        }
        [data-theme="light"] {
            --bg: #f4f6fa;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.05);
            --primary: #1e293b;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.15);
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            overflow-x: hidden;
            touch-action: manipulation;
            background-image: radial-gradient(circle at center, rgba(16, 185, 129, 0.05) 0%, var(--bg) 70%);
        }
        .daily-quote {
            width: 85%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 12px 20px;
            margin-top: 20px;
            text-align: center;
            font-size: 0.8rem;
            font-style: italic;
            color: var(--primary);
            opacity: 0.9;
        }
        .app-container {
            width: 85%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            text-align: center;
            z-index: 10;
            margin-top: 20px;
        }
        .streak-badge {
            background: rgba(249, 115, 22, 0.1);
            border: 1px solid var(--orange);
            color: var(--orange);
            padding: 6px 18px;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .icon-btn {
            cursor: pointer;
            font-size: 1.4rem;
            padding: 10px;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .icon-btn:hover {
            transform: scale(1.1);
        }
        .circle-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .progress-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
            pointer-events: none;
        }
        .progress-ring__circle {
            stroke: var(--accent);
            stroke-linecap: round;
            transition: stroke-dashoffset 0.2s;
            filter: drop-shadow(0px 0px 8px var(--accent-glow));
        }
        .main-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.05);
            transition: transform 0.1s;
            pointer-events: none;
            z-index: 2;
        }
        .count-num {
            font-size: 4rem;
            font-weight: 800;
            margin: 0;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .weekly-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 15px 0;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(125,125,125,0.2);
            transition: 0.3s;
        }
        .dot.active {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .btn {
            padding: 14px;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            flex: 1;
            color: var(--primary);
            background: var(--glass);
            backdrop-filter: blur(10px);
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-primary {
            border-color: var(--accent);
            color: var(--accent);
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: #0b1320;
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 35px;
            width: 85%;
            max-width: 340px;
            max-height: 70vh;
            overflow-y: auto;
            color: #fff;
        }
        [data-theme="light"] .modal-content {
            background: #fff;
            color: #1e293b;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: inherit;
            font-family: inherit;
        }
        #toast {
            visibility: hidden;
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 800;
            z-index: 3001;
        }
        #toast.show {
            visibility: visible;
        }
        .click-effect {
            transform: scale(0.92);
        }
        .footer {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            font-size: 0.8rem;
            opacity: 0.6;
            margin-top: auto;
        }
    </style>
</head>
<body data-theme="dark">
<audio id="clickSound" preload="auto"><source src="./click.mp3" type="audio/mpeg"></audio>
<audio id="neySound" loop preload="auto"><source src="./ney.mp3" type="audio/mpeg"></audio>
<audio id="bellSound" preload="auto"><source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg"></audio>
<div id="toast"></div>
<div class="daily-quote" id="quoteText">"Kalpler ancak Allah'ı anmakla huzur bulur." (Rad Suresi, 28)</div>
<div class="app-container">
    <div class="streak-badge"> <span id="streakCount">0</span> <span id="lang-day">GÜN</span></div>
    <div class="header">
        <span class="icon-btn" id="themeIcon" onclick="toggleTheme()">🌙</span>
        <span class="icon-btn" onclick="showModal('settingsModal')">⚙️</span>
        <span id="musicToggle" class="icon-btn" onclick="toggleMusic()">🎶</span>
    </div>
    <select id="zikirDropdown" onchange="switchZikir()"></select>
    <div class="circle-wrapper" id="clickBtn">
        <svg class="progress-ring" width="220" height="220">
            <circle class="progress-ring__circle" stroke-width="6" fill="transparent" r="95" cx="110" cy="110"/>
        </svg>
        <div class="main-circle">
            <div class="count-num" id="displayNum">0</div>
            <span id="targetLabel" style="font-size: 0.8rem; opacity: 0.6; font-weight: 600;">Hedef: 33</span>
        </div>
    </div>
    <div class="weekly-dots" id="weeklyDots"></div>
    <div class="btn-group">
        <button class="btn" id="lang-libBtn" onclick="showModal('libModal')">📚 Liste</button>
        <button class="btn btn-primary" id="lang-resetBtn" onclick="resetCurrent()">🔄 Sıfırla</button>
    </div>
</div>
<div class="footer"><span>© 2026 Zikirmatik Pro - Tüm Hakları Saklıdır.</span></div>
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3 id="lang-settingsTitle" style="text-align:center">Ayarlar</h3>
        <label id="lang-selectLangLabel">Dil Seçimi:</label>
        <select id="langSelect" onchange="changeLanguage()">
            <option value="tr">Türkçe</option>
            <option value="en">English</option>
            <option value="ar">العربية</option>
        </select>
        <button class="btn" style="width:100%; margin-top: 20px;" onclick="hideModal('settingsModal')">Kapat</button>
    </div>
</div>
<div id="libModal" class="modal">
    <div class="modal-content">
        <h3 id="lang-libTitle" style="text-align:center">Zikir Listesi</h3>
        <input type="text" id="customName" placeholder="Zikir Adı...">
        <input type="number" id="customTarget" placeholder="Hedef..." min="1">
        <button class="btn btn-primary" style="width:100%; margin-bottom: 15px;" onclick="addCustomZikir()">➕ Ekle</button>
        <div id="libList" style="max-height: 25vh; overflow-y: auto;"></div>
        <button class="btn" style="width:100%; margin-top:15px;" onclick="hideModal('libModal')">Kapat</button>
    </div>
</div>
<script>
    function safePlay(audioId) { const a = document.getElementById(audioId); if (a) a.play().catch(() => {}); }
    function unlockAudio() { ['clickSound', 'neySound', 'bellSound'].forEach(id => { const a = document.getElementById(id); if(a) a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(()=>{}); }); document.removeEventListener('pointerdown', unlockAudio); }
    document.addEventListener('pointerdown', unlockAudio);
    
    const translations = {
        tr: { day: "GÜN", libBtn: "📚 Liste", resetBtn: "🔄 Sıfırla", settingsTitle: "Ayarlar", selectLang: "Dil Seçimi:", libTitle: "Zikir Listesi", target: "Hedef", toastDone: "MaşAllah!", confirmReset: "Sıfırlansın mı?", confirmDelete: "Silinsin mi?" },
        en: { day: "DAYS", libBtn: "📚 List", resetBtn: "🔄 Reset", settingsTitle: "Settings", selectLang: "Language:", libTitle: "Dhikr List", target: "Target", toastDone: "MashAllah!", confirmReset: "Reset?", confirmDelete: "Delete?" },
        ar: { day: "يوم", libBtn: "📚 القائمة", resetBtn: "🔄 إعادة", settingsTitle: "الإعدادات", selectLang: "اللغة:", libTitle: "قائمة الأذكar", target: "الهدف", toastDone: "ما شاء الله", confirmReset: "إعادة؟", confirmDelete: "حذف؟" }
    };

    const varsayilanZikirler = [
        { name: "Sübhanallah", count: 0, target: 33 },
        { name: "Elhamdülillah", count: 0, target: 33 },
        { name: "Allahu Ekber", count: 0, target: 33 },
        { name: "Günahsız Ölüm Zikri", count: 0, target: 1 },
        { name: "Ya Fettâh", count: 0, target: 489 },
        { name: "Ya Rezzâk", count: 0, target: 308 },
        { name: "Ya Şâfi", count: 0, target: 391 },
        { name: "Hasbünallâh", count: 0, target: 450 },
        { name: "La havle...", count: 0, target: 100 },
        { name: "Secdede Ölmek İçin", count: 0, target: 1 },
        { name: "Kabir Azabı İçin", count: 0, target: 1 }
    ];

    localStorage.removeItem('zikirDB');
    localStorage.removeItem('currentIdx');

    let db = JSON.parse(JSON.stringify(varsayilanZikirler));
    localStorage.setItem('zikirDB', JSON.stringify(db));

    let currentLang = localStorage.getItem('lang') || 'tr';
    let currentIndex = 0;
    
    let streak = JSON.parse(localStorage.getItem('streakData')) || { count: 0, lastDate: null, history: [] };
    let circumference = 0;
    
    function initProgress() { const circle = document.querySelector('.progress-ring__circle'); const radius = circle.r.baseVal.value; circumference = radius * 2 * Math.PI; circle.style.strokeDasharray = `${circumference} ${circumference}`; circle.style.strokeDashoffset = circumference; }
    function setProgress(percent) { const circle = document.querySelector('.progress-ring__circle'); const offset = circumference - (percent / 100 * circumference); circle.style.strokeDashoffset = offset; }
    
    function init() { initProgress(); document.getElementById('langSelect').value = currentLang; applyLanguage(); updateView(); renderWeekly(); renderDropdown(); }
    function applyLanguage() { const t = translations[currentLang]; document.getElementById('lang-day').innerText = t.day; document.getElementById('lang-libBtn').innerText = t.libBtn; document.getElementById('lang-resetBtn').innerText = t.resetBtn; document.getElementById('lang-settingsTitle').innerText = t.settingsTitle; document.getElementById('lang-selectLangLabel').innerText = t.selectLang; document.getElementById('lang-libTitle').innerText = t.libTitle; renderDropdown(); }
    function updateView() { const curr = db[currentIndex] || db[0]; document.getElementById('displayNum').innerText = curr.count; document.getElementById('targetLabel').innerText = `${translations[currentLang].target}: ${curr.target}`; document.getElementById('streakCount').innerText = streak.count; const percentage = Math.min((curr.count % curr.target) / curr.target * 100, 100); setProgress(percentage === 0 && curr.count > 0 ? 100 : percentage); }

    document.getElementById('clickBtn').addEventListener('pointerdown', function() {
        this.classList.add('click-effect'); setTimeout(() => this.classList.remove('click-effect'), 100);
        db[currentIndex].count++;
        if (db[currentIndex].count % db[currentIndex].target === 0) { safePlay('bellSound'); showToast(translations[currentLang].toastDone); }
        const snd = document.getElementById('clickSound'); if(snd) { snd.currentTime = 0; safePlay('clickSound'); }
        recordActivity(); save(); updateView();
    });

    function addCustomZikir() { const name = document.getElementById('customName').value.trim(); const target = parseInt(document.getElementById('customTarget').value); if (name && target > 0) { db.push({ name: name, count: 0, target: target }); save(); renderDropdown(); renderLibrary(); document.getElementById('customName').value = ""; document.getElementById('customTarget').value = ""; } }
    function renderLibrary() { const list = document.getElementById('libList'); list.innerHTML = db.map((item, i) => `<div style="display:flex; justify-content:space-between; padding:12px 5px; border-bottom:1px solid rgba(125,125,125,0.05); align-items:center;"><div onclick="selectZikir(${i})" style="flex:1; cursor:pointer;"><strong>${item.name}</strong> <br> <small style="opacity:0.6;">${item.count} / ${item.target}</small></div><span onclick="deleteZikir(${i}, event)" style="padding:10px; cursor:pointer;">🗑️</span></div>`).join(''); }
    function deleteZikir(i, e) { e.stopPropagation(); if (confirm(translations[currentLang].confirmDelete)) { db.splice(i, 1); if (db.length === 0) db = JSON.parse(JSON.stringify(varsayilanZikirler)); if (currentIndex >= db.length) currentIndex = 0; save(); renderDropdown(); renderLibrary(); updateView(); } }
    function selectZikir(i) { currentIndex = i; save(); updateView(); renderDropdown(); hideModal('libModal'); }
    function save() { localStorage.setItem('zikirDB', JSON.stringify(db)); localStorage.setItem('currentIdx', currentIndex); }
    function renderDropdown() { document.getElementById('zikirDropdown').innerHTML = db.map((item, i) => `<option value="${i}" ${i === currentIndex ? 'selected' : ''}>${item.name}</option>`).join(''); }
    function switchZikir() { currentIndex = parseInt(document.getElementById('zikirDropdown').value); save(); updateView(); }
    function resetCurrent() { if(confirm(translations[currentLang].confirmReset)) { db[currentIndex].count = 0; save(); updateView(); } }
    function showModal(id) { document.getElementById(id).style.display = 'flex'; if(id==='libModal') renderLibrary(); }
    function hideModal(id) { document.getElementById(id).style.display = 'none'; }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.className = "show"; setTimeout(()=>t.className="", 3000); }
    function toggleTheme() { const body = document.body; const currentTheme = body.getAttribute('data-theme'); const newTheme = currentTheme === 'dark' ? 'light' : 'dark'; body.setAttribute('data-theme', newTheme); document.getElementById('themeIcon').innerText = newTheme === 'dark' ? '🌙' : '☀️'; }
    function toggleMusic() { const n = document.getElementById('neySound'); if(n) { if(n.paused) safePlay('neySound'); else n.pause(); } }
    function changeLanguage() { currentLang = document.getElementById('langSelect').value; localStorage.setItem('lang', currentLang); applyLanguage(); updateView(); }
    
    function recordActivity() {
        const today = new Date(); const todayStr = today.toLocaleDateString();
        if (streak.lastDate !== todayStr) {
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            if (streak.lastDate === yesterday.toLocaleDateString()) streak.count++;
            else if (streak.lastDate === null || streak.lastDate !== todayStr) streak.count = 1;
            streak.lastDate = todayStr; if(!streak.history.includes(todayStr)) streak.history.push(todayStr); localStorage.setItem('streakData', JSON.stringify(streak)); renderWeekly();
        }
    }
    function renderWeekly() { const dots = document.getElementById('weeklyDots'); dots.innerHTML = ""; for(let i=6; i>=0; i--) { const d = new Date(); d.setDate(d.getDate() - i); dots.innerHTML += `<div class="dot ${streak.history.includes(d.toLocaleDateString()) ? 'active' : ''}"></div>`; } }
    document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
