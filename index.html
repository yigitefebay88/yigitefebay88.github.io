<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0e17">
    
    <script src="https://quge5.com/88/tag.min.js" data-zone="10797884" async data-cfasync="false"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1198714971337229" crossorigin="anonymous"></script>

    <base target="_self">
    <title>Zikirmatik Pro | Atomic Shield</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-image: url('arkaplan.png'); --bg: #f0f2f5; --glass: rgba(255, 255, 255, 0.85);
            --primary: #1e293b; --accent: #10b981; --accent-neon: 0 0 15px #10b981;
            --gold: #f59e0b; --gold-neon: 0 0 15px #f59e0b; --orange: #f97316; --blue: #3b82f6;
        }

        [data-theme="dark"] {
            --glass: rgba(18, 25, 41, 0.92); --primary: #f8fafc; --accent: #10b981;
        }

        body { 
            font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--primary); 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; 
            overflow: hidden; touch-action: none; background-image: var(--bg-image);
            background-size: cover; background-position: center;
        }

        /* REKLAM ENGELLEYİCİ ÜST KATMAN */
        #adBlockerOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 999999; pointer-events: none; /* Altındaki butonlara tıklamaya izin verir ama scriptleri bozar */
        }

        .app-container { 
            width: 90%; max-width: 400px; background: var(--glass); backdrop-filter: blur(25px);
            border-radius: 40px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center; position: relative; z-index: 10;
        }

        .main-circle { 
            width: min(50vw, 200px); height: min(50vw, 200px); margin: 10px auto; border-radius: 50%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: rgba(255,255,255,0.03); cursor: pointer; border: 8px solid var(--accent); 
            box-shadow: var(--accent-neon); position: relative; z-index: 100;
        }

        /* Diğer CSS'lerin aynı kaldığını varsayıyorum (Kısalık için burayı atlıyorum, kodun içinde tam hali var) */
        .count-num { font-size: clamp(2.5rem, 10vw, 4rem); font-weight: 800; pointer-events: none; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { padding: 12px; border: none; border-radius: 18px; cursor: pointer; flex: 1; color: white; font-weight: bold; }
        .btn-lib { background: var(--blue); } .btn-primary { background: var(--accent); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: var(--glass); padding: 25px; border-radius: 35px; width: 85%; }
        #toast { visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--gold); padding: 12px 25px; border-radius: 50px; font-weight: 800; z-index: 3000; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body data-theme="dark">

<div id="adBlockerOverlay"></div>

<audio id="clickSound"><source src="click.mp3" type="audio/mpeg"></audio>
<audio id="neySound" loop><source src="ney.mp3" type="audio/mpeg"></audio>
<audio id="bellSound"><source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg"></audio>

<div id="toast"></div>

<div class="app-container">
    <div class="header" style="display:flex; justify-content: space-between; margin-bottom: 10px;">
        <span onclick="toggleTheme()" style="cursor:pointer; font-size: 1.5rem;">🌙</span>
        <span onclick="showModal('settingsModal')" style="cursor:pointer; font-size: 1.5rem;">⚙️</span>
    </div>

    <select id="zikirDropdown" onchange="switchZikir()" style="width:100%; padding:10px; border-radius:15px; background:rgba(125,125,125,0.1); color:inherit; border:none; margin-bottom:10px;"></select>
    <div id="mainDesc" style="font-size: 0.8rem; min-height: 3rem; margin-bottom: 10px; font-style: italic; opacity: 0.8;"></div>

    <div class="main-circle" id="clickBtn">
        <p class="count-num" id="display">0</p>
        <span id="targetLabel" style="font-size: 0.8rem; opacity: 0.7;">Hedef: 33</span>
    </div>

    <div class="btn-group">
        <button class="btn btn-lib" onclick="showModal('libModal')">📚 Liste</button>
        <button class="btn btn-primary" onclick="resetCurrent()">🔄 Sıfırla</button>
    </div>
</div>

<div id="libModal" class="modal"><div class="modal-content"><h3>📚 Zikirlerin</h3><div id="libList"></div><button class="btn" onclick="hideModal('libModal')" style="background:var(--orange); width:100%; margin-top:10px;">Kapat</button></div></div>
<div id="settingsModal" class="modal"><div class="modal-content"><h3>⚙️ Ayarlar</h3><button class="btn btn-primary" onclick="hideModal('settingsModal')" style="width:100%;">Kapat</button></div></div>

<script>
    // --- ATOMIC SHIELD LOGIC ---
    
    // 1. Her türlü yeni pencere açma fonksiyonunu tamamen öldür
    const killPops = () => {
        window.open = function() { return { focus: function(){}, close: function(){} }; };
        window.alert = function(){};
        console.log("Pops Killed.");
    };
    killPops();
    setInterval(killPops, 1000); // Monetag'ın tekrar tanımlamasını engellemek için her saniye çalıştır

    // 2. Tıklamaları sadece zikir butonuna hapset
    document.addEventListener('click', function(e) {
        if (!e.target.closest('#clickBtn') && !e.target.closest('.btn') && !e.target.closest('select')) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }
    }, true);

    // --- ZİKİRMATİK CORE ---
    const varsayilanZikirler = [{ name: "Sübhanallah", count: 0, target: 33, desc: "Allah'ı tenzih ederim." }, { name: "Elhamdülillah", count: 0, target: 33, desc: "Hamd Allah'adır." }, { name: "Allahu Ekber", count: 0, target: 33, desc: "Allah en büyüktür." }];
    let db = JSON.parse(localStorage.getItem('zikirDB')) || varsayilanZikirler;
    let currentIndex = parseInt(localStorage.getItem('currentIdx')) || 0;

    function updateView() {
        const curr = db[currentIndex];
        document.getElementById('display').innerText = curr.count;
        document.getElementById('targetLabel').innerText = `Hedef: ${curr.target}`;
        document.getElementById('mainDesc').innerText = curr.desc || "";
    }

    // Ana Tıklama Olayı (PointerDown kullanarak Monetag'ın Click dinleyicisini bypass ediyoruz)
    document.getElementById('clickBtn').addEventListener('pointerdown', function(e) {
        e.stopPropagation();
        e.preventDefault();
        
        db[currentIndex].count++;
        if (db[currentIndex].count >= db[currentIndex].target) {
            document.getElementById('bellSound').play().catch(()=>{});
            showToast("MaşAllah!");
        }
        
        document.getElementById('clickSound').currentTime = 0;
        document.getElementById('clickSound').play().catch(()=>{});
        
        if (navigator.vibrate) navigator.vibrate(50);
        
        save();
        updateView();
    });

    function save() { localStorage.setItem('zikirDB', JSON.stringify(db)); localStorage.setItem('currentIdx', currentIndex); }
    function renderDropdown() { document.getElementById('zikirDropdown').innerHTML = db.map((item, i) => `<option value="${i}" ${i === currentIndex ? 'selected' : ''}>${item.name}</option>`).join(''); }
    function switchZikir() { currentIndex = parseInt(document.getElementById('zikirDropdown').value); save(); updateView(); }
    function resetCurrent() { if(confirm("Sıfırlansın mı?")) { db[currentIndex].count = 0; save(); updateView(); } }
    function showModal(id) { document.getElementById(id).style.display = 'flex'; }
    function hideModal(id) { document.getElementById(id).style.display = 'none'; }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.className = "show"; setTimeout(()=>t.className="", 2000); }
    function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme')==='dark'?'light':'dark'); }

    window.onload = () => { renderDropdown(); updateView(); };
</script>
</body>
</html>
