<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0e17">
    <meta name="monetag" content="40d0b540f33fa8972f25b286c133b2af">
    <script src="https://quge5.com/88/tag.min.js" data-zone="224163" async data-cfasync="false"></script>
    <base target="_self">
    
    <title>Zikirmatik Pro | V30 Stable</title>
    
   
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-image: url('arkaplan.png'); 
            --bg: #f0f2f5;
            --glass: rgba(255, 255, 255, 0.85);
            --primary: #1e293b;
            --accent: #f59e0b; 
            --accent-neon: 0 0 15px rgba(245, 158, 11, 0.5), 0 0 25px rgba(245, 158, 11, 0.3);
            --gold: #f59e0b; --gold-neon: 0 0 10px rgba(245, 158, 11, 0.3);
            --orange: #f97316; --blue: #3b82f6; --blue-neon: 0 0 15px rgba(183, 210, 253, 0.5);
        }

        [data-theme="dark"] {
            --bg-image: url('arkaplan.png'); 
            --glass: rgba(18, 25, 41, 0.92);
            --primary: #f8fafc;
            --accent: #10b981; 
            --accent-neon: 0 0 15px #10b981, 0 0 25px #34d399;
            --gold: #f1c40f; --gold-neon: 0 0 15px #f1c40f, 0 0 30px #f39c12;
            --orange: #e67e22; --blue: #3498db; --blue-neon: 0 0 20px #3498db, 0 0 35px #2980b9;
        }

        body { 
            font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--primary); 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; 
            transition: 0.4s; user-select: none; overflow: hidden; touch-action: manipulation;
            -webkit-tap-highlight-color: transparent; background-image: var(--bg-image);
            background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed;
        }

        .app-container { 
            width: 90%; max-width: 400px; background: var(--glass); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); border-radius: 40px; padding: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center; 
            border: 1px solid rgba(255,255,255,0.08); transition: 0.5s ease-in-out; margin: 10px; z-index: 10;
        }

        @keyframes flipDown {
            0% { transform: scale(1) rotateX(0deg); }
            50% { transform: scale(0.9) rotateX(180deg); }
            100% { transform: scale(1) rotateX(360deg); }
        }
        .spin-active { animation: flipDown 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        .streak-badge {
            background: rgba(230, 126, 34, 0.15); border: 1px solid var(--orange); color: var(--orange);
            padding: 6px 18px; border-radius: 25px; font-size: 0.85rem; font-weight: 800;
            display: inline-flex; align-items: center; gap: 6px; margin-bottom: 10px;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .icon-btn { cursor: pointer; font-size: 1.5rem; transition: 0.3s; opacity: 0.9; padding: 5px; }
        
        .main-circle { 
            width: min(50vw, 200px); height: min(50vw, 200px); margin: 10px auto; border-radius: 50%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: rgba(255,255,255,0.03); cursor: pointer; border: 8px solid var(--accent); 
            transition: border 0.3s, box-shadow 0.3s; box-shadow: var(--accent-neon);
            -webkit-tap-highlight-color: transparent;
        }
        
        .count-num { font-size: clamp(2.5rem, 10vw, 4rem); font-weight: 800; margin: 0; line-height: 1; pointer-events: none; }
        .weekly-dots { display: flex; justify-content: center; gap: 8px; margin: 15px 0; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(125,125,125,0.3); }
        .dot.active { background: var(--accent); box-shadow: var(--accent-neon); }
        .btn-group { display: flex; justify-content: center; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 18px; cursor: pointer; font-weight: 600; font-size: 0.85rem; color: white; flex: 1; transition: 0.3s; }
        .btn-lib { background: var(--blue); }
        .btn-primary { background: var(--accent); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); justify-content: center; align-items: center; z-index: 2000; padding: 10px; }
        .modal-content { background: var(--glass); backdrop-filter: blur(20px); padding: 25px; border-radius: 35px; width: 100%; max-width: 320px; color: var(--primary); max-height: 80vh; overflow-y: auto; }
        input, select.lang-select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 12px; border: 1px solid rgba(125,125,125,0.3); background: rgba(255,255,255,0.05); color: inherit; box-sizing: border-box; font-family: inherit; }
        .lib-item { padding: 15px; border-bottom: 1px solid rgba(125,125,125,0.1); display: flex; flex-direction: column; text-align: left; gap: 5px; }
        .lib-row { display: flex; justify-content: space-between; align-items: center; }
        .lib-desc-preview { font-size: 0.75rem; opacity: 0.6; font-style: italic; white-space: pre-wrap; line-height: 1.2; }

        #toast {
            visibility: hidden; min-width: 200px; background-color: var(--gold); color: #000;
            text-align: center; border-radius: 50px; padding: 12px; position: fixed;
            z-index: 3001; bottom: 30px; left: 50%; transform: translateX(-50%); font-weight: 800;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
    </style>
</head>
<body data-theme="dark">

<audio id="clickSound"><source src="click.mp3" type="audio/mpeg"></audio>
<audio id="neySound" loop><source src="ney.mp3" type="audio/mpeg"></audio>
<audio id="bellSound"><source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg"></audio>

<div id="toast"></div>

<div class="app-container" id="mainContainer">
    <div class="streak-badge"> <span id="streakCount">0</span> <span id="lang-day">GÜN</span></div>
    <div class="header">
        <span class="icon-btn" id="themeIcon" onclick="toggleTheme()">🌙</span>
        <span class="icon-btn" onclick="showModal('settingsModal')">⚙️</span>
        <span id="musicToggle" class="icon-btn" onclick="toggleMusic()">🎶</span>
    </div>

    <div style="background: rgba(125,125,125,0.1); padding: 5px 10px; border-radius: 20px; margin-bottom: 10px;">
        <select id="zikirDropdown" onchange="switchZikir()" style="width:100%; font-weight:600; background:transparent; border:none; color:inherit; height: 40px; outline:none;"></select>
    </div>
    
    <div id="mainDesc" style="font-size: 0.75rem; color: var(--accent); min-height: 4.5rem; font-style: italic; display: flex; align-items: center; justify-content: center; line-height: 1.3; white-space: pre-wrap; padding: 0 5px; text-align: center;">...</div>

    <div class="main-circle" id="clickBtn">
        <p class="count-num" id="display">0</p>
        <span id="targetLabel" style="font-size: 0.8rem; opacity: 0.7; font-weight: 600;">Hedef: 33</span>
    </div>

    <div class="weekly-dots" id="weeklyDots"></div>

    <div class="btn-group">
        <button class="btn btn-lib" id="lang-libBtn" onclick="showModal('libModal')">📚 Liste</button>
        <button class="btn btn-primary" id="lang-resetBtn" onclick="resetCurrent()">🔄 Sıfırla</button>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3 style="text-align: center;" id="lang-settingsTitle">⚙️ Ayarlar</h3>
        <label id="lang-selectLangLabel">Dil / Language:</label>
        <select id="langSelect" class="lang-select" onchange="changeLanguage()">
            <option value="tr">Türkçe</option>
            <option value="en">English</option>
            <option value="ar">العربية</option>
        </select>
        <div class="reminder-card" style="margin-top:15px;">
            <span id="lang-reminderLabel">⏰ Hatırlatıcı</span><br>
            <input type="time" id="reminderTime">
        </div>
        <button class="btn btn-primary" style="width:100%; margin-top: 20px;" id="lang-closeSettings" onclick="hideModal('settingsModal')">Kapat</button>
    </div>
</div>

<div id="libModal" class="modal">
    <div class="modal-content">
        <h3 id="lang-libTitle">📚 Zikirlerin</h3>
        <div style="background: rgba(125,125,125,0.08); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--orange);">
            <input type="text" id="customName" placeholder="...">
            <input type="number" id="customTarget" placeholder="..." min="1">
            <button class="btn btn-primary" style="width:100%; margin-top: 10px;" id="lang-addBtn" onclick="addCustomZikir()">➕ Ekle</button>
        </div>
        <div id="libList" style="max-height: 40vh; overflow-y: auto;"></div>
        <button class="btn" style="width:100%; margin-top:20px; background: var(--orange);" id="lang-closeLib" onclick="hideModal('libModal')">Kapat</button>
    </div>
</div>

<script>
    // --- GLOBAL HATA KALKANI (V30) ---
    // Monetag kaynaklı Promise ve Script hatalarının uygulamayı dondurmasını engeller
    window.onerror = function(msg, url, line, col, error) {
        if (url && (url.includes('quge5.com') || url.includes('094kk.com') || url.includes('monetag'))) {
            console.warn("Reklam Hatası Yakalandı ve Engellendi.");
            return true; 
        }
        return false;
    };

    window.onunhandledrejection = function(event) {
        if (event.reason && event.reason.stack && (event.reason.stack.includes('tag.min.js') || event.reason.stack.includes('094kk'))) {
            event.preventDefault(); 
        }
    };

    // --- REKLAM KONTROL ---
    let lastAdTime = 0;
    const AD_INTERVAL = 45000; // 45 Saniyede bir reklam izni

    window.open = function(url, target, features) {
        try {
            let now = new Date().getTime();
            if (now - lastAdTime < AD_INTERVAL) return null; 
            lastAdTime = now;
            return window.parent.open(url, target, features);
        } catch (e) { return null; }
    };

    const clickSound = document.getElementById('clickSound');
    const neySound = document.getElementById('neySound');
    const bellSound = document.getElementById('bellSound');
    const toast = document.getElementById('toast');
    const mainDesc = document.getElementById('mainDesc');

    const translations = {
        tr: { day: "GÜN", libBtn: "📚 Liste", resetBtn: "🔄 Sıfırla", settingsTitle: "⚙️ Ayarlar", selectLang: "Dil / Language:", reminder: "⏰ Hatırlatıcı", close: "Kapat", libTitle: "📚 Zikirlerin", add: "➕ Ekle", target: "Hedef", toastDone: "MaşAllah! Hedef Tamamlandı.", confirmReset: "Sıfırlansın mı?", confirmDelete: "Bu zikri silmek istediğine emin misin?", placeholderName: "Zikir Adı...", placeholderTarget: "Hedef Sayı..." },
        en: { day: "DAYS", libBtn: "📚 List", resetBtn: "🔄 Reset", settingsTitle: "⚙️ Settings", selectLang: "Language:", reminder: "⏰ Reminder", close: "Close", libTitle: "📚 Your Dhikr", add: "➕ Add", target: "Target", toastDone: "MashAllah! Target Completed.", confirmReset: "Reset counts?", confirmDelete: "Are you sure you want to delete?", placeholderName: "Dhikr Name...", placeholderTarget: "Target Count..." },
        ar: { day: "يوم", libBtn: "📚 القائمة", resetBtn: "🔄 إعادة ضبط", settingsTitle: "⚙️ الإعدادات", selectLang: "اللغة:", reminder: "⏰ تذكير", close: "إغلاق", libTitle: "📚 أذكارك", add: "➕ إضافة", target: "الهدف", toastDone: "ما شاء الله! اكتمل الهدف.", confirmReset: "هل تريد إعادة الضبط؟", confirmDelete: "هل أنت متأكد من الحذف؟", placeholderName: "اسم الذكر...", placeholderTarget: "العدد المستهدف..." }
    };

    const varsayilanZikirler = [
        { name: "Günahsız Ölmeye Vesile Zikir Grubu", count: 0, target: 1, desc: "1- Lâ ilâhe illallâhu vahdehû vallâhu ekber. \n2- Lâ ilâhe illallâhu vahdeh. \n3- Lâ ilâhe illallâhu lâ şerîke leh. \n4- Lâ ilâhe illallâhu lehül mülkü ve lehül hamd. \n5- Lâ ilâhe illallâh, ve lâ havle ve lâ kuvvete illâ billâh." },
        { name: "Ya Fettâh", count: 0, target: 489, desc: "Tüm hayır kapılarını açmak ve işlerin kolaylığı için." },
        { name: "Ya Rezzâk", count: 0, target: 308, desc: "Maddi ve manevi rızkın bollaşması, bereket için." },
        { name: "Ya Şâfi", count: 0, target: 391, desc: "Hastalıklar için şifa ve ruhen iyileşme niyetine." },
        { name: "Hasbünallâh", count: 0, target: 450, desc: "Her türlü zorluk ve düşmana karşı Allah'a sığınmak için." },
        { name: "La havle vela kuvvete illa billah", count: 0, target: 100, desc: "Güç ve kuvvetin yalnızca Allah'tan olduğunu ifade etmek için." },
        { name: "Astaghfirullah", count: 0, target: 100, desc: "Allah'tan bağışlanma dilemek için." },
        { name: "La ilahe illallah", count: 0, target: 100, desc: "Allah'tan başka ilah olmadığını ifade etmek için." },
        { name: "Subhanallah", count: 0, target: 100, desc: "Allah'ı her türlü eksiklikten tenzih etmek için." },
        { name: "Elhamdülillah", count: 0, target: 100, desc: "Bütün hamd ve şükürler Allah'adır." },
        { name: "Allahu Ekber", count: 0, target: 100, desc: "Allah en büyüktür." },
        { name: "Ya Hayyü Ya Kayyum", count: 0, target: 100, desc: "Allah'ın diri ve her şeye gücü yeten olduğunu ifade etmek için." },
        { name: "Ya Allah", count: 0, target: 100, desc: "Allah'ın ismini anarak O'na yönelmek ve yardım dilemek için." },
        { name: "Ya Rahman", count: 0, target: 100, desc: "Allah'ın sonsuz merhametini anmak ve O'ndan merhamet dilemek için." },
        { name: "Ya Rahim", count: 0, target: 100, desc: "Allah'ın rahmetini anmak ve O'ndan rahmet dilemek için." },
        { name: "Ya Aziz", count: 0, target: 100, desc: "Allah'ın her türlü zorluk ve düşmana karşı galip olduğunu ifade etmek için." },
        { name: "Ya Cebbar", count: 0, target: 100, desc: "Allah'ın her şeye gücü yeten ve zorlayıcı olduğunu ifade etmek için." },
        { name: "Ya Mücib", count: 0, target: 100, desc: "Allah'ın duaları kabul eden olduğunu ifade etmek için." },
        { name: "Ya Vahhab", count: 0, target: 100, desc: "Allah'ın bol bol veren olduğunu ifade etmek için." },
        { name: "Ya Alim", count: 0, target: 100, desc: "Allah'ın her şeyi bilen olduğunu ifade etmek için." },
        { name: "Ya Kabid", count: 0, target: 100, desc: "Allah'ın dilediği zaman rızkı daraltabileceğini ifade etmek için." },
        { name: "Ya Basit", count: 0, target: 100, desc: "Allah'ın dilediği zaman rızkı genişletebileceğini ifade etmek için." },
        { name: "es-selâmü aleyke eyyühe’n-nebiyyü ve rahmetullâhi ve berekâtüh", count: 0, target: 100, desc: "Secdede ölmek için." },
        { name: "Allâhümme bi hakki seyyidinâ Muhammedin ve âli Muhammedin sallallâhu aleyhi ve selleme lâ tüazzib hâzel meyyit", count: 0, target: 3, desc: "Kabirdeki kişinin kabir azabını yok eder." }
    ];

    let db = [];
    let currentLang = localStorage.getItem('lang') || 'tr';
    let currentIndex = parseInt(localStorage.getItem('currentIdx')) || 0;
    let streak = JSON.parse(localStorage.getItem('streakData')) || { count: 0, lastDate: null, history: [] };

    function initApp() {
        const savedData = JSON.parse(localStorage.getItem('zikirDB')) || [];
        db = varsayilanZikirler.map(v => {
            const savedMatch = savedData.find(s => s.name === v.name);
            return savedMatch ? { ...v, count: savedMatch.count } : v;
        });
        savedData.forEach(s => { if(!varsayilanZikirler.some(v => v.name === s.name)) db.push(s); });
        applyLanguage(); updateView(); renderWeekly();
    }

    function applyLanguage() {
        const t = translations[currentLang];
        document.getElementById('lang-day').innerText = t.day;
        document.getElementById('lang-libBtn').innerText = t.libBtn;
        document.getElementById('lang-resetBtn').innerText = t.resetBtn;
        document.getElementById('lang-settingsTitle').innerText = t.settingsTitle;
        document.getElementById('lang-selectLangLabel').innerText = t.selectLang;
        document.getElementById('lang-reminderLabel').innerText = t.reminder;
        document.getElementById('lang-closeSettings').innerText = t.close;
        document.getElementById('lang-libTitle').innerText = t.libTitle;
        document.getElementById('lang-addBtn').innerText = t.add;
        document.getElementById('lang-closeLib').innerText = t.close;
        document.getElementById('customName').placeholder = t.placeholderName;
        document.getElementById('customTarget').placeholder = t.placeholderTarget;
        renderDropdown();
    }

    function changeLanguage() { currentLang = document.getElementById('langSelect').value; localStorage.setItem('lang', currentLang); applyLanguage(); updateView(); }

    function updateView() {
        if (db.length === 0) return;
        const curr = db[currentIndex];
        document.getElementById('display').innerText = curr.count;
        document.getElementById('targetLabel').innerText = `${translations[currentLang].target}: ${curr.target}`;
        document.getElementById('streakCount').innerText = streak.count;
        mainDesc.innerText = curr.desc || "";
        const circle = document.getElementById('clickBtn');
        circle.style.borderColor = curr.count >= curr.target ? "var(--gold)" : "var(--accent)";
        circle.style.boxShadow = curr.count >= curr.target ? "var(--gold-neon)" : "var(--accent-neon)";
    }

    // ANA BUTON
    document.getElementById('clickBtn').addEventListener('pointerdown', function(e) {
        let now = new Date().getTime();
        if (now - lastAdTime < AD_INTERVAL) e.stopImmediatePropagation();

        e.preventDefault();
        this.classList.remove('spin-active');
        void this.offsetWidth;
        this.classList.add('spin-active');

        if (navigator.vibrate) navigator.vibrate(40);
        clickSound.currentTime = 0; clickSound.play().catch(()=>{});
        
        db[currentIndex].count++;
        if (db[currentIndex].count === db[currentIndex].target) {
            showToast(translations[currentLang].toastDone);
            bellSound.play().catch(()=>{});
        }
        recordActivity(); save(); updateView();
    });

    function addCustomZikir() {
        const name = document.getElementById('customName').value.trim();
        const target = parseInt(document.getElementById('customTarget').value);
        if (name && target > 0) {
            db.push({ name: name, count: 0, target: target, desc: "..." });
            save(); renderDropdown(); renderLibrary();
            document.getElementById('customName').value = ""; document.getElementById('customTarget').value = "";
        }
    }

    function deleteZikir(index, event) {
        event.stopPropagation();
        if (confirm(translations[currentLang].confirmDelete)) {
            db.splice(index, 1);
            if (currentIndex >= db.length) currentIndex = 0;
            save(); renderDropdown(); renderLibrary(); updateView();
        }
    }

    function selectZikir(index) { currentIndex = index; save(); updateView(); renderDropdown(); hideModal('libModal'); }

    function renderLibrary() {
        const libList = document.getElementById('libList');
        libList.innerHTML = db.map((item, i) => `
            <div class="lib-item">
                <div class="lib-row" onclick="selectZikir(${i})" style="cursor:pointer;">
                    <strong>${item.name}</strong>
                    <div style="display:flex; align-items:center; gap:10px;">
                         <span>(${item.count}/${item.target})</span>
                         <span onclick="deleteZikir(${i}, event)" style="cursor:pointer; padding:5px;">🗑️</span>
                    </div>
                </div>
                <div class="lib-desc-preview" onclick="selectZikir(${i})" style="cursor:pointer;">${item.desc || ""}</div>
            </div>`).join('');
    }

    function save() { localStorage.setItem('zikirDB', JSON.stringify(db)); localStorage.setItem('currentIdx', currentIndex); }
    function renderDropdown() { document.getElementById('zikirDropdown').innerHTML = db.map((item, i) => `<option value="${i}" ${i === currentIndex ? 'selected' : ''}>${item.name}</option>`).join(''); }
    function showToast(text) { toast.innerText = text; toast.className = "show"; setTimeout(() => { toast.className = ""; }, 3000); }
    function recordActivity() {
        const today = new Date().toLocaleDateString();
        if (streak.lastDate !== today) {
            streak.count++; streak.lastDate = today;
            if(!streak.history.includes(today)) streak.history.push(today);
            localStorage.setItem('streakData', JSON.stringify(streak));
            renderWeekly();
        }
    }
    function renderWeekly() {
        const dotsCont = document.getElementById('weeklyDots');
        dotsCont.innerHTML = "";
        for(let i=6; i>=0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            dotsCont.innerHTML += `<div class="dot ${streak.history.includes(d.toLocaleDateString()) ? 'active' : ''}"></div>`;
        }
    }
    function switchZikir() { currentIndex = parseInt(document.getElementById('zikirDropdown').value); save(); updateView(); }
    function resetCurrent() { if(confirm(translations[currentLang].confirmReset)) { db[currentIndex].count = 0; save(); updateView(); } }
    function showModal(id) { document.getElementById(id).style.display = 'flex'; if(id==='libModal') renderLibrary(); }
    function hideModal(id) { document.getElementById(id).style.display = 'none'; }
    function toggleTheme() { 
        const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', theme);
        document.getElementById('themeIcon').innerText = theme === 'dark' ? '🌙' : '☀️';
    }
    function toggleMusic() { if(neySound.paused) neySound.play(); else neySound.pause(); }

    window.onload = initApp;
</script>
</body>
</html>
