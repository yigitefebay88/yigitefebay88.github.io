<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0e17"> 

    <title>Zikirmatik | Neon Pro V24</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-image: url('arkaplan.png'); 
            --bg: #f0f2f5;
            --glass: rgba(255, 255, 255, 0.85);
            --primary: #1e293b;
            --accent: #f59e0b; 
            --accent-neon: 0 0 15px rgba(245, 158, 11, 0.5), 0 0 25px rgba(245, 158, 11, 0.3);
            --gold: #f59e0b; --gold-neon: 0 0 10px rgba(245, 158, 11, 0.3);
            --orange: #f97316; --blue: #3b82f6; --blue-neon: 0 0 15px rgba(183, 210, 253, 0.5);
            --red: #ef4444;
        }

        [data-theme="dark"] {
            --bg-image: url('arkaplan.png'); 
            --glass: rgba(18, 25, 41, 0.92);
            --primary: #f8fafc;
            --accent: #10b981; 
            --accent-neon: 0 0 15px #10b981, 0 0 25px #34d399;
            --gold: #f1c40f; --gold-neon: 0 0 15px #f1c40f, 0 0 30px #f39c12;
            --orange: #e67e22; --blue: #3498db; --blue-neon: 0 0 20px #3498db, 0 0 35px #2980b9;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg);
            color: var(--primary); 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; 
            transition: 0.4s; user-select: none; overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .app-container { 
            width: 90%; max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            text-align: center; border: 1px solid rgba(255,255,255,0.08); transition: 0.5s ease-in-out;
            margin: 10px;
            z-index: 10;
        }

        @keyframes flipDown {
            0% { transform: scale(1) rotateX(0deg); }
            50% { transform: scale(0.9) rotateX(180deg); }
            100% { transform: scale(1) rotateX(360deg); }
        }

        .spin-active { animation: flipDown 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        .streak-badge {
            background: rgba(230, 126, 34, 0.15); border: 1px solid var(--orange); color: var(--orange);
            padding: 6px 18px; border-radius: 25px; font-size: 0.85rem; font-weight: 800;
            display: inline-flex; align-items: center; gap: 6px; margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .icon-btn { cursor: pointer; font-size: 1.5rem; transition: 0.3s; opacity: 0.9; padding: 5px; -webkit-tap-highlight-color: transparent; }
        
        #themeIcon { text-shadow: var(--gold-neon); }
        #musicToggle { filter: grayscale(1); opacity: 0.6; }
        #musicToggle.active { filter: grayscale(0); opacity: 1; color: var(--blue); text-shadow: var(--blue-neon); }

        .main-circle { 
            width: min(50vw, 200px); 
            height: min(50vw, 200px);
            margin: 10px auto; border-radius: 50%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: rgba(255,255,255,0.03);
            cursor: pointer; border: 8px solid var(--accent); 
            transition: border 0.3s, box-shadow 0.3s; 
            box-shadow: var(--accent-neon);
            outline: none;
            -webkit-tap-highlight-color: transparent;
            perspective: 1000px;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }
        
        .count-num { font-size: clamp(2.5rem, 10vw, 4rem); font-weight: 800; margin: 0; line-height: 1; pointer-events: none; }

        .weekly-dots { display: flex; justify-content: center; gap: 8px; margin: 15px 0; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(125,125,125,0.3); }
        .dot.active { background: var(--accent); box-shadow: var(--accent-neon); }

        .btn-group { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 12px; border: none; border-radius: 18px; cursor: pointer; font-weight: 600; margin: 5px; font-size: 0.85rem; color: white; flex: 1; min-width: 120px; transition: 0.3s; -webkit-tap-highlight-color: transparent; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .btn-lib { background: var(--blue); }
        .btn-primary { background: var(--accent); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); justify-content: center; align-items: center; z-index: 2000; padding: 10px; }
        .modal-content { background: var(--glass); backdrop-filter: blur(20px); padding: 25px; border-radius: 35px; width: 100%; max-width: 320px; color: var(--primary); text-align: left; max-height: 80vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
        
        input[type="text"], input[type="number"], input[type="time"] {
            width: 100%; padding: 12px; margin: 5px 0; border-radius: 12px; border: 1px solid rgba(125,125,125,0.3);
            background: rgba(255,255,255,0.05); color: inherit; font-family: inherit; box-sizing: border-box; outline: none;
        }

        .lib-item { padding: 12px; border-bottom: 1px solid rgba(125,125,125,0.1); display: flex; justify-content: space-between; align-items: center; }

        #toast {
            visibility: hidden; min-width: 200px; background-color: var(--gold); color: #000;
            text-align: center; border-radius: 50px; padding: 12px; position: fixed;
            z-index: 3001; bottom: 30px; left: 50%; transform: translateX(-50%); font-weight: 800; box-shadow: var(--gold-neon);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
    </style>
</head>
<body data-theme="dark">

<audio id="clickSound"><source src="click.mp3" type="audio/mpeg"></audio>
<audio id="neySound" loop><source src="ney.mp3" type="audio/mpeg"></audio>
<audio id="bellSound"><source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg"></audio>

<div id="toast"></div>

<div class="app-container" id="mainContainer">
    <div class="streak-badge"> <span id="streakCount">0</span> <span data-lang="days">GÜN</span></div>

    <div class="header">
        <span class="icon-btn" id="themeIcon" onclick="toggleTheme()">🌙</span>
        <span class="icon-btn" onclick="showModal('settingsModal')">⚙️</span>
        <span id="musicToggle" class="icon-btn" onclick="toggleMusic()">🎶</span>
    </div>

    <div style="background: rgba(125,125,125,0.1); padding: 5px 10px; border-radius: 20px; margin-bottom: 10px;">
        <select id="zikirDropdown" onchange="switchZikir()" style="width:100%; font-weight:600; cursor:pointer; outline:none; background:transparent; border:none; color:inherit; height: 40px;"></select>
    </div>
    
    <div id="mainDesc" style="font-size: 0.75rem; color: var(--accent); min-height: 3rem; font-style: italic; padding: 0 10px; display: flex; align-items: center; justify-content: center; line-height: 1.3;">
        Yükleniyor...
    </div>

    <div class="main-circle" id="clickBtn">
        <p class="count-num" id="display">0</p>
        <span id="targetLabel" style="font-size: 0.8rem; opacity: 0.7; font-weight: 600;">Hedef: 33</span>
    </div>

    <div class="weekly-dots" id="weeklyDots"></div>

    <div class="btn-group">
        <button class="btn btn-lib" id="libBtn" onclick="showModal('libModal')">📚 Liste</button>
        <button class="btn btn-primary" id="resetBtn" onclick="resetCurrent()">🔄 Sıfırla</button>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3 id="settingsTitle" style="text-align: center; margin-bottom: 20px;">⚙️ Ayarlar</h3>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span data-lang="language">Dil</span>
            <select id="langSelect" onchange="changeLang()" style="padding: 5px; border-radius: 8px;">
                <option value="tr">Türkçe</option>
                <option value="en">English</option>
                <option value="ar">العربية</option>
            </select>
        </div>
        <div class="reminder-card">
            <span style="font-weight: 800; font-size: 0.85rem;">⏰ <span data-lang="reminder">Hatırlatıcı</span></span><br>
            <input type="time" id="reminderTime" onchange="saveSettings()">
        </div>
        <button class="btn btn-primary" style="width:100%; margin-top: 20px; background: var(--blue);" onclick="hideModal('settingsModal')">Tamam</button>
    </div>
</div>

<div id="libModal" class="modal">
    <div class="modal-content">
        <h3 id="libTitle">📚 Zikirlerin</h3>
        <div class="add-zikir-box" style="background: rgba(125,125,125,0.08); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--orange);">
            <input type="text" id="customName" placeholder="Zikir Adı...">
            <input type="number" id="customTarget" placeholder="Hedef Sayı..." min="1">
            <button class="btn btn-primary" style="width:100%; margin: 10px 0 0 0;" onclick="addCustomZikir()">➕ Ekle</button>
        </div>
        <div id="libList" style="max-height: 30vh; overflow-y: auto;"></div>
        <button class="btn" style="width:100%; margin-top:20px; background: var(--orange);" onclick="hideModal('libModal')">Kapat</button>
    </div>
</div>

<script>
    const clickSound = document.getElementById('clickSound');
    const neySound = document.getElementById('neySound');
    const bellSound = document.getElementById('bellSound');
    const toast = document.getElementById('toast');
    const mainDesc = document.getElementById('mainDesc');
    
    // VERİ KAYNAĞI
    const TDV_DATA_URL = "https://raw.githubusercontent.com/atilsamancioglu/K21-JSONDataSet/master/countries.json"; 

    const langData = {
        tr: { days: "GÜN", target: "Hedef", list: "📚 Liste", reset: "🔄 Sıfırla", settings: "⚙️ Ayarlar", language: "Dil", reminder: "Hatırlatıcı", save: "Kaydet", close: "Kapat", virdDone: "MaşAllah! Hedef Tamamlandı.", zikirTime: "📿 Zikir Vakti!", resetConfirm: "Sıfırlansın mı?", delConfirm: "Bu zikri silmek istediğine emin misin?", libTitle: "📚 Zikirlerin", elhamd: "Elhamdülillah 100 yaptın!" },
        en: { days: "DAYS", target: "Target", list: "📚 List", reset: "🔄 Reset", settings: "⚙️ Settings", language: "Language", reminder: "Reminder", save: "Save", close: "Close", virdDone: "MaşAllah! Target Completed.", zikirTime: "📿 Time for Dhikr!", resetConfirm: "Reset current count?", delConfirm: "Delete this dhikr?", libTitle: "📚 Your Dhikrs", elhamd: "Alhamdulillah 100!" },
        ar: { days: "يوم", target: "الهدف", list: "📚 القائمة", reset: "🔄 إعادة", settings: "⚙️ الإعدادات", language: "اللغة", reminder: "التذكير", save: "حفظ", close: "إğلاق", virdDone: "ما شاء الله!", zikirTime: "📿 وقت الذكر!", resetConfirm: "هل تريد التصفير؟", delConfirm: "هل تريد الحذف？", libTitle: "📚 أذكارك", elhamd: "الحمد لله 100!" }
    };

    let currentLang = localStorage.getItem('lang') || 'tr';
    let db = JSON.parse(localStorage.getItem('zikirDB')) || [
        { name: "Sübhanallah", count: 0, target: 33, desc: "Allah'ı her türlü eksiklikten tenzih ederim." },
        { name: "Elhamdülillah", count: 0, target: 33, desc: "Bütün hamd ve şükürler Allah'adır." },
        { name: "Allahu Ekber", count: 0, target: 33, desc: "Allah en büyüktür." },
        { name: "La ilahe illallah", count: 0, target: 33, desc: "Allah'tan başka ilah yoktur." }
    ];
    let currentIndex = parseInt(localStorage.getItem('currentIdx')) || 0;
    let streak = JSON.parse(localStorage.getItem('streakData')) || { count: 0, lastDate: null, history: [] };
    let reminderTime = localStorage.getItem('reminderTime') || "";

    // URL'DEN VERİ ÇEKME FONKSİYONU
 // Hata veren kısmı bu fonksiyonla değiştir:
    async function fetchZikirData() {
        try {
            const response = await fetch(TDV_DATA_URL);
            
            // Eğer URL hatalıysa veya JSON değilse burası yakalar
            if (!response.ok) throw new Error('Ağ hatası');
            
            const data = await response.json();
            
            // Veri başarıyla gelirse işle
            if(data && Array.isArray(data)) {
                 data.slice(0, 10).forEach(item => {
                     const zikirName = item.name.common || item.name;
                     // Eğer zikir listede yoksa ekle
                     if(!db.some(z => z.name === zikirName)) {
                         db.push({ 
                            name: zikirName, 
                            count: 0, 
                            target: 99, 
                            desc: "Bu zikir huzur ve bereket niyetiyle çekilir." 
                         });
                     }
                 });
                 save();
                 renderDropdown();
                 updateView();
            }
        } catch (error) {
            console.log("Dış veri çekilemedi, yerel liste yükleniyor:", error);
            
            // HATA ALIRSA BURASI ÇALIŞIR: En iyi zikirleri manuel ekleyelim
            const yerelZikirler = [
                { name: "Ya Fettâh", count: 0, target: 489, desc: "Tüm hayır kapılarını açmak ve işlerin kolaylığı için." },
                { name: "Ya Rezzâk", count: 0, target: 308, desc: "Maddi ve manevi rızkın bollaşması, bereket için." },
                { name: "Ya Şâfi", count: 0, target: 391, desc: "Hastalıklar için şifa ve ruhen iyileşme niyetine." },
                { name: "Hasbünallâh", count: 0, target: 450, desc: "Her türlü zorluk ve düşmana karşı Allah'a sığınmak için." },           
                {name: "La havle vela kuvvete illa billah", count: 0, target: 100, desc: "Güç ve kuvvetin yalnızca Allah'tan olduğunu ifade etmek için." },
                {name: "Astaghfirullah", count: 0, target: 100, desc: "Allah'tan bağışlanma dilemek için." },
                {name: "La ilahe illallah", count: 0, target: 100, desc: "Allah'tan başka ilah olmadığını ifade etmek için." },
                {name: "Subhanallah", count: 0, target: 100, desc: "Allah'ı her türlü eksiklikten tenzih etmek için." },
                {name: "Elhamdülillah", count: 0, target: 100, desc: "Bütün hamd ve şükürler Allah'adır." },
                {name: "Allahu Ekber", count: 0, target: 100, desc: "Allah en büyüktür." },
                {name: "ya hayyü ya kayyum", count: 0, target: 100, desc: "Allah'ın diri ve her şeye gücü yeten olduğunu ifade etmek için." },
                {name: "Ya Allah", count: 0, target: 100, desc: "Allah'ın ismini anarak O'na yönelmek ve yardım dilemek için." },
                {name: "Ya Rahman", count: 0, target: 100, desc: "Allah'ın sonsuz merhametini anmak ve O'ndan merhamet dilemek için." },
                {name: "Ya Rahim", count: 0, target: 100, desc: "Allah'ın rahmetini anmak ve O'ndan rahmet dilemek için." },
                {name: "Ya Aziz", count: 0, target: 100, desc: "Allah'ın her türlü zorluk ve düşmana karşı galip olduğunu ifade etmek için." },
                {name: "Ya Cebbar", count: 0, target: 100, desc: "Allah'ın her şeye gücü yeten ve zorlayıcı olduğunu ifade etmek için." },
                {name: "Ya Mücib", count: 0, target: 100, desc: "Allah'ın duaları kabul eden olduğunu ifade etmek için." },
                {name: "Ya Vahhab", count: 0, target: 100, desc: "Allah'ın bol bol veren olduğunu ifade etmek için." },
                {name: "ya alim", count: 0, target: 100, desc: "Allah'ın her şeyi bilen olduğunu ifade etmek için." },
                {name: "Ya Kabid", count: 0, target: 100, desc: "Allah'ın dilediği zaman rızkı daraltabileceğini ifade etmek için." },
                {name: "Ya Basit", count: 0, target: 100, desc: "Allah'ın dilediği zaman rızkı genişletebileceğini ifade etmek için." },
                {name:"Lâ ilâhe illallâhu vahdehû vallâhu ekber.", count: 0, target: 1, desc: "günahsız ölmeye vesile olan zikir(bir kere okunur 1 ay korur)" },
                {name: "Lâ ilâhe illallâhu vahdeh.", count: 0, target: 1, desc: "günahsız ölmeye vesile olan zikir(bir kere okunur 1 ay korur)" },
                {name:"Lâ ilâhe illallâhu lâ şerîke leh.", count: 0, target: 1, desc: "günahsız ölmeye vesile olan zikir(bir kere okunur 1 ay korur)" },
                {name:"Lâ ilâhe illallâhu lehül mülkü ve lehül hamd.", count: 0, target: 1, desc: "günahsız ölmeye vesile olan zikir(bir kere okunur 1 ay korur)" },
                {name:"Lâ ilâhe illallâh, ve lâ havle ve lâ kuvvete illâ billâh.", count: 0, target: 1, desc: "günahsız ölmeye vesile olan zikir(bir kesre okunur 1 ay korur)" },
                {name: "es-selâmü aleyke eyyühe’n-nebiyyü ve rahmetullâhi ve berekâtüh", count: 0, target: 100, desc: "secdede ölmek için" },
                {name:"Allâhümme bi hakki seyyidinâ Muhammedin ve âli Muhammedin sallallâhu aleyhi ve selleme lâ tüazzib hâzel meyyit",count: 0, target: 3, desc: "kabirdeki kişinin kabir azabını yok eder" },

                
             
 
  {
  name: "Günahsız Ölmeye Vesile Olan Zikir Grubu",
  count: 0,
  target: 1,
  desc: "Bu 5 zikir birer kere okunur (1 ay korur): \n1- Lâ ilâhe illallâhu vahdehû vallâhu ekber. \n2- Lâ ilâhe illallâhu vahdeh. \n3- Lâ ilâhe illallâhu lâ şerîke leh. \n4- Lâ ilâhe illallâhu lehül mülkü ve lehül hamd. \n5- Lâ ilâhe illallâh, ve lâ havle ve lâ kuvvete illâ billâh.",
}
        








                


            ];

            yerelZikirler.forEach(z => {
                if(!db.some(existing => existing.name === z.name)) {
                    db.push(z);
                }
            });

            save();
            renderDropdown();
            updateView();
            mainDesc.innerText = "Zikir listesi güncellendi.";
        }
    }

    function toggleTheme() {
        const nextTheme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        applyTheme(nextTheme);
        localStorage.setItem('theme', nextTheme);
    }

    function applyTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        const icon = document.getElementById('themeIcon');
        icon.innerText = theme === 'dark' ? '🌙' : '☀️';
        icon.style.color = theme === 'dark' ? 'var(--gold)' : '#555';
        updateView();
    }

    function updateView() {
        if (db.length === 0) return;
        const curr = db[currentIndex];
        document.getElementById('display').innerText = curr.count;
        document.getElementById('targetLabel').innerText = `${langData[currentLang].target}: ${curr.target}`;
        document.getElementById('streakCount').innerText = streak.count;
        
        // Açıklamayı güncelle
        mainDesc.innerText = curr.desc || "Fazileti: Bu zikir kalbe ferahlık verir.";

        const circle = document.getElementById('clickBtn');
        circle.style.borderColor = curr.count >= curr.target ? "var(--gold)" : "var(--accent)";
        circle.style.boxShadow = curr.count >= curr.target ? "var(--gold-neon)" : "var(--accent-neon)";
    }

    document.getElementById('clickBtn').addEventListener('pointerdown', function(e) {
        e.preventDefault(); 
        if (db.length === 0) return;
        
        this.classList.remove('spin-active');
        void this.offsetWidth; 
        this.classList.add('spin-active');

        if (navigator.vibrate) navigator.vibrate(50);
        clickSound.currentTime = 0; clickSound.play().catch(()=>{});
        db[currentIndex].count++;
        recordActivity();
        
        if (db[currentIndex].count % 100 === 0) {
            showToast(langData[currentLang].elhamd);
            bellSound.play().catch(()=>{});
        } else if (db[currentIndex].count === db[currentIndex].target) {
            showToast(langData[currentLang].virdDone);
            bellSound.play().catch(()=>{});
        }
        save();
        updateView();
    });

    function addCustomZikir() {
        const name = document.getElementById('customName').value.trim();
        const target = parseInt(document.getElementById('customTarget').value);
        if (name && target > 0) {
            const exists = db.some(z => z.name.toLowerCase() === name.toLowerCase());
            if(!exists) {
                db.push({ name: name, count: 0, target: target, desc: "Kullanıcı tarafından eklendi." });
                save(); renderDropdown(); renderLibrary();
                document.getElementById('customName').value = "";
                document.getElementById('customTarget').value = "";
                showToast("Eklendi ✅");
                updateView();
            } else { showToast("Zaten var!"); }
        }
    }

    function deleteZikir(index, event) {
        event.stopPropagation();
        if (confirm(langData[currentLang].delConfirm)) {
            db.splice(index, 1);
            if (currentIndex >= db.length) currentIndex = 0;
            save(); renderDropdown(); renderLibrary(); updateView();
        }
    }

    function selectZikir(index) {
        currentIndex = index;
        save(); updateView(); renderDropdown(); hideModal('libModal');
    }

    function renderLibrary() {
        const libList = document.getElementById('libList');
        libList.innerHTML = db.map((item, i) => `
            <div class="lib-item">
                <div class="lib-text" onclick="selectZikir(${i})" style="cursor:pointer; flex:1;"><strong>${item.name}</strong> (${item.count}/${item.target})</div>
                <div class="del-icon" onclick="deleteZikir(${i}, event)" style="cursor:pointer; padding:5px;">🗑️</div>
            </div>
        `).join('');
    }

    function save() { localStorage.setItem('zikirDB', JSON.stringify(db)); localStorage.setItem('currentIdx', currentIndex); }
    
    function renderDropdown() {
        const drp = document.getElementById('zikirDropdown');
        drp.innerHTML = db.map((item, i) => `<option value="${i}" ${i === currentIndex ? 'selected' : ''}>${item.name}</option>`).join('');
    }

    function showToast(text) {
        toast.innerText = text; toast.className = "show";
        setTimeout(() => { toast.className = ""; }, 3000);
    }

    function recordActivity() {
        const today = new Date().toLocaleDateString();
        if (streak.lastDate !== today) {
            streak.count++; streak.lastDate = today;
            if(!streak.history.includes(today)) streak.history.push(today);
            localStorage.setItem('streakData', JSON.stringify(streak));
            renderWeekly();
        }
    }

    function renderWeekly() {
        const dotsCont = document.getElementById('weeklyDots');
        dotsCont.innerHTML = "";
        for(let i=6; i>=0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            dotsCont.innerHTML += `<div class="dot ${streak.history.includes(d.toLocaleDateString()) ? 'active' : ''}"></div>`;
        }
    }

    function switchZikir() { currentIndex = parseInt(document.getElementById('zikirDropdown').value); save(); updateView(); }
    function resetCurrent() { if(confirm(langData[currentLang].resetConfirm)) { db[currentIndex].count = 0; save(); updateView(); } }
    function showModal(id) { document.getElementById(id).style.display = 'flex'; if(id==='libModal') renderLibrary(); }
    function hideModal(id) { document.getElementById(id).style.display = 'none'; }
    function saveSettings() { reminderTime = document.getElementById('reminderTime').value; localStorage.setItem('reminderTime', reminderTime); showToast(langData[currentLang].save); }
    function changeLang() { currentLang = document.getElementById('langSelect').value; localStorage.setItem('lang', currentLang); applyLang(); }
    function toggleMusic() { if(neySound.paused) { neySound.play(); document.getElementById('musicToggle').classList.add('active'); } else { neySound.pause(); document.getElementById('musicToggle').classList.remove('active'); } }

    function applyLang() {
        const t = langData[currentLang];
        document.querySelectorAll('[data-lang]').forEach(el => {
            const key = el.getAttribute('data-lang');
            if(t[key]) el.innerText = t[key];
        });
        document.getElementById('libBtn').innerText = t.list;
        document.getElementById('resetBtn').innerText = t.reset;
        document.getElementById('settingsTitle').innerText = t.settings;
        document.getElementById('libTitle').innerText = t.libTitle;
        updateView();
    }

    // BAŞLATMA
    const savedTheme = localStorage.getItem('theme') || 'dark';
    applyTheme(savedTheme);
    document.getElementById('reminderTime').value = reminderTime;
    applyLang(); renderWeekly(); renderDropdown(); fetchZikirData();
</script>
</body>
</html>
